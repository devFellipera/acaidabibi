<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Extras</title>
<link rel="stylesheet" href="style.css">
</head>
<body>



<h2>🍇 Monte seu Açaí</h2>

<!-- GRATIS -->
<div class="card">
<h3>🥄 Acompanhamentos</h3>

<label class="opcao">
  <input type="checkbox" value="Leite condensado">
  <span>Leite condensado</span>
</label>

<label class="opcao">
  <input type="checkbox" value="Banana">
  <span>Banana</span>
</label>

<label class="opcao">
  <input type="checkbox" value="Leite integral">
  <span>Leite integral</span>
</label>
</div>

<!-- PAGOS -->
<div class="card">
<h3>➕ Extras pagos</h3>

<label class="opcao">
  <input type="checkbox" value="Paçoca" data-price="1">
  <span>Paçoca <strong>+R$1</strong></span>
</label>

<label class="opcao">
  <input type="checkbox" value="Creme de avelã" data-price="2">
  <span>Creme de avelã <strong>+R$2</strong></span>
</label>

<label class="opcao">
  <input type="checkbox" value="Confete" data-price="2">
  <span>Confete <strong>+R$2</strong></span>
</label>

<label class="opcao">
  <input type="checkbox" value="Morango" data-price="2">
  <span>Morango <strong>+R$2</strong></span>
</label>

</div>

<!-- BOTÃO -->
<button onclick="irFinal()">Continuar</button>
<!-- VOLTAR -->
<button onclick="voltar()">⬅️ Voltar</button>

<script src="script.js"></script>
</body>
</html>
